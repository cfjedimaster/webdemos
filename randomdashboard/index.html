<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app" id="app">
      <header class="header">
        <div class="header__brand">
          <span class="header__emoji" id="themeEmoji" aria-hidden="true">📊</span>
          <div>
            <h1 class="header__title" id="themeTitle">Loading…</h1>
            <p class="header__tagline" id="themeTagline"></p>
          </div>
        </div>
        <div class="header__meta">
          <span class="mono" id="clock">--:--:--</span>
          <button type="button" class="btn" id="reshuffle" title="New random theme (same as reload)">
            New theme
          </button>
        </div>
      </header>

      <section class="kpis" id="kpiRow" aria-label="Key metrics"></section>

      <div class="grid">
        <article class="panel panel--chart">
          <h2 class="panel__title" id="barTitle">Weekly</h2>
          <canvas id="barChart" width="640" height="280" role="img" aria-label="Bar chart"></canvas>
        </article>

        <article class="panel panel--chart">
          <h2 class="panel__title" id="donutTitle">Mix</h2>
          <div class="donut-wrap">
            <canvas id="donutChart" width="320" height="320" role="img" aria-label="Donut chart"></canvas>
            <ul class="legend" id="donutLegend"></ul>
          </div>
        </article>

        <article class="panel panel--wide">
          <div class="panel__head">
            <h2 class="panel__title" id="lineTitle">Live stream</h2>
            <span class="badge badge--pulse" id="liveBadge">Live</span>
          </div>
          <canvas id="lineChart" width="960" height="260" role="img" aria-label="Live line chart"></canvas>
        </article>

        <article class="panel">
          <h2 class="panel__title" id="tableTitle">Leaderboard</h2>
          <div class="table-wrap">
            <table class="data-table" id="leaderTable">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>
        </article>

        <article class="panel">
          <h2 class="panel__title">Mood board</h2>
          <p class="prose" id="staticBlurb"></p>
          <div class="bars" id="progressBars" aria-label="Static progress bars"></div>
        </article>
      </div>

      <footer class="footer">
        <p>All numbers are fictional. Reload the page for a completely new universe.</p>
      </footer>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
