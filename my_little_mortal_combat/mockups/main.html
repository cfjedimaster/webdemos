<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arena — My Little Mortal Combat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Sora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>
    <div class="blood-splats" aria-hidden="true">
      <svg class="splat splat--1" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
        <path
          fill="currentColor"
          d="M60 5c8 12 22 8 28 20 6 14-4 28 8 38 10 8 24 4 22 18-2 12-18 14-28 8-14-8-12-26-24-32-10-4-24 2-30-10-6-14 8-28 24-42z"
        />
      </svg>
      <svg class="splat splat--2" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <path
          fill="currentColor"
          d="M50 2c15 8 20 24 12 38-6 10 4 22-6 32-8 8-22 6-32-4-8-8-6-22 2-32 8-10 4-24 24-34z"
        />
      </svg>
      <svg class="splat splat--3" viewBox="0 0 90 80" xmlns="http://www.w3.org/2000/svg">
        <path
          fill="currentColor"
          d="M45 0c12 6 18 20 10 32-8 12 2 24-8 34-10 10-26 8-34-6-6-12 2-26 14-36 10-8 8-20 18-24z"
        />
      </svg>
    </div>

    <header class="dash-header">
      <p class="dash-header__title">The arena</p>
    </header>

    <main class="dashboard">
      <section class="panel panel--dash-stats" aria-labelledby="pony-heading">
        <h1 id="pony-heading" class="dash-player-name">Buttercup the Destroyer</h1>

        <div class="dash-meta">
          <div class="dash-meta__item">
            <span class="dash-meta__label">Level</span>
            <span class="dash-meta__value">3</span>
          </div>
          <div class="dash-meta__item">
            <span class="dash-meta__label">Gold</span>
            <span class="dash-meta__value">120</span>
          </div>
        </div>

        <h2 class="dash-section-title">Skills</h2>
        <p class="dash-section-hint">Spend gold to train. Costs are placeholders for now.</p>

        <ul class="skill-train-list">
          <li class="skill-train">
            <span class="skill-train__name">Attack</span>
            <span class="skill-train__rank" aria-label="Attack level">5</span>
            <button type="button" class="btn btn--train">Train · 10 gold</button>
          </li>
          <li class="skill-train">
            <span class="skill-train__name">Defense</span>
            <span class="skill-train__rank" aria-label="Defense level">4</span>
            <button type="button" class="btn btn--train">Train · 10 gold</button>
          </li>
          <li class="skill-train">
            <span class="skill-train__name">Strike a Pose</span>
            <span class="skill-train__rank" aria-label="Strike a Pose level">6</span>
            <button type="button" class="btn btn--train">Train · 10 gold</button>
          </li>
        </ul>
      </section>

      <section class="dash-opponents" aria-labelledby="opponents-heading">
        <h2 id="opponents-heading" class="dash-opponents__title">Pick a pony to fight</h2>
        <p class="dash-opponents__hint">Select a challenger, then let them have it.</p>

        <form class="dash-opponents__form" action="battle.html" method="get">
          <input type="hidden" name="player" value="Buttercup the Destroyer" id="battle-player-field" />
          <div class="opponent-cards" role="radiogroup" aria-label="Opponents">
            <label class="opponent-card">
              <input
                class="opponent-card__input"
                type="radio"
                name="opponent"
                value="sparkle-stomp"
                checked
              />
              <span class="opponent-card__surface">
                <span class="opponent-card__name">Princess Sparkle-Stomp</span>
                <span class="opponent-card__level">Level 2</span>
              </span>
            </label>

            <label class="opponent-card">
              <input class="opponent-card__input" type="radio" name="opponent" value="mane-event" />
              <span class="opponent-card__surface">
                <span class="opponent-card__name">Mane Event Horizon</span>
                <span class="opponent-card__level">Level 4</span>
              </span>
            </label>

            <label class="opponent-card">
              <input class="opponent-card__input" type="radio" name="opponent" value="glitter-grudge" />
              <span class="opponent-card__surface">
                <span class="opponent-card__name">Glitter Grudge</span>
                <span class="opponent-card__level">Level 3</span>
              </span>
            </label>
          </div>

          <button type="submit" class="btn btn--fight">FIGHT!</button>
        </form>
      </section>
    </main>
  </body>
</html>
