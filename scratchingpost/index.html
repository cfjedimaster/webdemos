<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Scratching Post — for cats only ✨</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <a href="#" class="logo">
          <span class="logo-icon">🐱</span>
          <span>The Scratching Post</span>
        </a>
        <nav class="nav">
          <a href="#">Home</a>
          <a href="#">Explore</a>
          <a href="#">Notifications</a>
        </nav>
      </div>
    </header>

    <main class="main">
      <h1 class="feed-title">
        <span class="sparkle">✨</span>
        <span class="feed-title-text">Your feed</span>
        <span id="feed-loading-status" class="feed-loading-status" hidden aria-live="polite">
          Loading new posts…
        </span>
      </h1>
      <div id="feed"></div>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <span>Created by <a href="https://www.raymondcamden.com" target="_blank" rel="noopener noreferrer">Raymond Camden</a></span>
        <span class="footer-sep" aria-hidden="true">•</span>
        <a href="https://github.com/cfjedimaster/webdemos/tree/master/scratchingpost" target="_blank" rel="noopener noreferrer">Source</a>
      </div>
    </footer>
  </div>
  <script src="post-card.js"></script>
  <script src="app.js"></script>
</body>
</html>
